<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الرياضيات المبدعة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root { --main-blue: #0056b3; --accent: #f39c12; --bg: #f8f9fa; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        .hero { background: var(--main-blue); color: white; padding: 40px; text-align: center; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        
        /* صندوق الدردشة */
        #chat-window { position: fixed; bottom: 80px; left: 20px; width: 320px; height: 400px; background: white; display: none; flex-direction: column; box-shadow: 0 5px 20px rgba(0,0,0,0.2); border-radius: 10px; }
        #messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 14px; border-bottom: 1px solid #eee; }
        .input-area { display: flex; padding: 10px; }
        .input-area input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>منصة الرياضيات المبدعة</h1>
    <p>مساعدك الذكي وتدريباتك في مكان واحد</p>
</div>

<div class="container">
    <div class="card">
        <h2>📂 ملخصات الدروس</h2>
        <p>دروس السنة الرابعة متوسط وشهادة التعليم المتوسط.</p>
    </div>

    <div class="card">
        <h2>✏️ تمرين تفاعلي</h2>
        <p>احسب \( PGCD(120, 48) \)</p>
        <button class="btn" onclick="alert('الحل هو 24')">أظهر الحل</button>
    </div>
</div>

<button onclick="toggleChat()" style="position:fixed; bottom:20px; left:20px; padding:15px; border-radius:50px; background:var(--main-blue); color:white; border:none; cursor:pointer;">💬 اسأل الذكاء الاصطناعي</button>

<div id="chat-window">
    <div style="background:var(--main-blue); color:white; padding:10px; border-radius:10px 10px 0 0;">المساعد الذكي 🤖</div>
    <div id="messages"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="اكتب سؤالك هنا...">
        <button onclick="askAI()" style="background:var(--accent); border:none; color:white; padding:5px 10px; margin-right:5px; border-radius:5px;">إرسال</button>
    </div>
</div>

<script>
    function toggleChat() {
        const win = document.getElementById('chat-window');
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
    }

    async function askAI() {
        const input = document.getElementById('user-input');
        const msgDiv = document.getElementById('messages');
        const text = input.value;
        if(!text) return;

        msgDiv.innerHTML += `<div><b>أنت:</b> ${text}</div>`;
        input.value = "";

        // استبدل الكلمة أدناه بمفتاحك الذي نسخته
        const API_KEY = "AIzaSyCKYjmPx78dMNW3HOY51wAgiyElPM0SYow"; 

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "أنت أستاذ رياضيات جزائري خبير، أجب بوضوح على: " + text }] }] })
            });
            const data = await response.json();
            const result = data.candidates[0].content.parts[0].text;
            msgDiv.innerHTML += `<div style="color:green"><b>المساعد:</b> ${result}</div>`;
            msgDiv.scrollTop = msgDiv.scrollHeight;
        } catch (e) {
            msgDiv.innerHTML += `<div style="color:red">خطأ: تأكد من المفتاح</div>`;
        }
    }
</script>

</body>
</html>
